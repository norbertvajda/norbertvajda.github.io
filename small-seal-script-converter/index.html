<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <link rel="stylesheet" href="style.css" />
  </head>
  
  <body>
    <textarea id="input" placeholder="Type here..."></textarea>

    <label>
      Font size
      
      <input
          type="range"
          id="size"
          min="16"
          max="520"
          value="36">
      
    </label>

    <button id="horizontal">Horizontal</button>
    <button id="vertical">Vertical</button>


    <button id="smaller">−</button>
    <button id="larger">+</button>

    <div id="output"></div>

    <script src="script.js"></script>
</body>
</html>
